<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ARKAN — أسعار الصرف اليوم</title>
<link rel="icon" href="arkan-icon-512.png">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;600;700;800&family=Space+Grotesk:wght@600;700&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080916;--card:#101122;--acc:#8B72FF;--acc2:#B9A8FF;--gold:#E8C24A;--gold2:#F5DE8B;--txt:#EDEAFB;--dim:#8B8FA8;--green:#3DDC97;--stroke:rgba(255,255,255,.08)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:linear-gradient(180deg,#14122B 0%,#0D0E20 30%,#080916 68%,#050610 100%);background-attachment:fixed;min-height:100vh;font-family:'Cairo',sans-serif;color:var(--txt);padding-bottom:40px}
.wrap{max-width:540px;margin:0 auto;padding:30px 18px}
.logo{display:flex;align-items:center;gap:13px;justify-content:center;margin-bottom:6px}
.logo img{width:52px;height:52px;border-radius:14px;box-shadow:0 8px 26px rgba(91,63,209,.5)}
h1{text-align:center;font-size:22px;font-weight:800;letter-spacing:.5px}
h1 span{color:var(--acc2)}
.sub{text-align:center;color:var(--dim);font-size:12px;letter-spacing:2px;margin:5px 0 22px;font-family:'IBM Plex Mono'}
.card{background:linear-gradient(150deg,rgba(255,255,255,.08),rgba(255,255,255,.02));border:1px solid var(--stroke);border-radius:22px;padding:22px 18px;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:0 10px 34px rgba(0,0,0,.4);margin-bottom:16px}
.card h2{font-size:15px;margin-bottom:14px}
label{display:block;font-size:12px;color:var(--dim);margin:12px 0 6px;font-weight:600}
input,select{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--stroke);border-radius:14px;padding:15px;color:var(--txt);font-size:18px;font-family:'IBM Plex Mono';outline:none;text-align:center}
input:focus,select:focus{border-color:var(--acc)}
select{font-family:'Cairo';font-size:16px}
.res{background:linear-gradient(135deg,rgba(139,114,255,.16),rgba(91,63,209,.06));border:1px solid rgba(183,163,255,.3);border-radius:18px;padding:18px;margin-top:16px;text-align:center}
.res .lbl{font-size:12px;color:var(--acc2);font-weight:700;margin-bottom:4px}
.res .big{font-size:32px;font-weight:800;font-family:'IBM Plex Mono';color:#fff;line-height:1.2}
.res .cur{font-size:14px;color:var(--acc2);font-weight:700}
.res .rate{font-size:11px;color:var(--dim);margin-top:6px;font-family:'IBM Plex Mono'}
.tier{display:flex;gap:8px;margin-top:12px}
.tierbox{flex:1;background:rgba(0,0,0,.25);border:1px solid var(--stroke);border-radius:14px;padding:12px;text-align:center}
.tierbox.on{background:rgba(61,220,151,.12);border-color:rgba(61,220,151,.4)}
.tierbox .t{font-size:11px;color:var(--dim)}
.tierbox .v{font-size:16px;font-weight:800;font-family:'IBM Plex Mono';margin-top:3px}
.go{width:100%;margin-top:18px;padding:17px;border:none;border-radius:16px;font-size:16px;font-weight:800;background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;cursor:pointer;font-family:'Cairo';box-shadow:0 10px 28px rgba(37,211,102,.3)}
.rateGrid{display:grid;grid-template-columns:1fr auto auto;gap:8px 12px;font-size:13px;align-items:center}
.rateGrid .h{font-size:11px;color:var(--dim);font-weight:700;padding-bottom:4px;border-bottom:1px solid var(--stroke)}
.rateGrid .cc{font-weight:800;font-family:'IBM Plex Mono'}
.rateGrid .pw{font-family:'IBM Plex Mono';color:var(--gold2);font-weight:700;text-align:center}
.rateGrid .pr{font-family:'IBM Plex Mono';color:var(--txt);text-align:center}
.note{margin-top:14px;font-size:11px;color:var(--dim);text-align:center;line-height:1.7}
footer{text-align:center;margin-top:24px;color:var(--dim);font-size:10px;letter-spacing:1.5px;font-family:'IBM Plex Mono'}
.empty{text-align:center;color:var(--dim);padding:30px 0}
</style>

<style id="pageTransition">
/* ===== EXODUS-LIKE PAGE TRANSITIONS ===== */
@view-transition{navigation:auto}
::view-transition-old(root){animation:ptOut .28s cubic-bezier(.22,1,.36,1) forwards}
::view-transition-new(root){animation:ptIn .38s cubic-bezier(.22,1,.36,1) forwards}
@keyframes ptOut{to{opacity:0;transform:translateY(-8px) scale(.995)}}
@keyframes ptIn{from{opacity:0;transform:translateY(12px) scale(.995)}to{opacity:1;transform:none}}
/* fallback للمتصفحات الأقدم: تلاشٍ عند الدخول */
html.pt-enter body{animation:ptIn .38s cubic-bezier(.22,1,.36,1)}
</style>
<script id="pageTransitionJS">(function(){
  document.documentElement.classList.add('pt-enter');
  var standalone=(window.matchMedia&&matchMedia('(display-mode: standalone)').matches)||(navigator.standalone===true);
  document.addEventListener('click',function(e){
    var a=e.target.closest?e.target.closest('a[href]'):null;
    if(!a)return;
    var href=a.getAttribute('href');
    if(!href||href.charAt(0)==='#'||/^https?:/i.test(href)||href.indexOf('mailto')===0||a.target==='_blank')return;
    e.preventDefault();
    if(standalone||!document.startViewTransition){
      /* standalone: انتقال فوري مباشر — الأكثر موثوقية داخل PWA على iOS */
      if(!standalone){
        document.body.style.transition='opacity .18s ease';
        document.body.style.opacity='0';
        setTimeout(function(){location.href=href;},170);
      }else{
        location.href=href;
      }
    }else{
      location.href=href;
    }
  },true);
})();</script>
<link rel="manifest" href="site-manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ARKAN">
</head>
<body>
<div class="wrap">
  <a href="./" style="display:flex;align-items:center;justify-content:center;gap:11px;margin-bottom:20px;text-decoration:none">
    <img src="arkan-logo.svg" alt="ARKAN" style="width:36px;height:36px;border-radius:10px;box-shadow:0 6px 20px rgba(124,92,255,.45)">
    <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;letter-spacing:.02em;direction:ltr;color:#EDEAFB"><b>ARKAN</b> <span style="color:#B9A8FF">SETTLEMENTS</span></span>
  </a>
  
  <h1>أسعار الصرف اليوم</h1>
  <div class="sub en">LIVE RATES · INSTANT TRANSFER</div>

  <div id="app"></div>

  <footer class="en">© ARKAN · EXCHANGE DESK</footer>
</div>

<script>
const $=id=>document.getElementById(id);
function fmt(n,d=0){return Number(n).toLocaleString('en-US',{maximumFractionDigits:d});}
const SYM={AOA:'Kz',MRU:'UM',CNY:'¥',AED:'AED',EUR:'€',USD:'$',USDT:'₮',MAD:'MAD'};
const NAMES={AOA:'كوانزا أنغولية',MRU:'أوقية موريتانية',CNY:'يوان صيني',AED:'درهم إماراتي',EUR:'يورو',USD:'دولار',USDT:'تيثر',MAD:'درهم مغربي'};

let DATA=null;
async function loadData(){
  /* أولًا: hash (رابط سريع) */
  try{
    const hash=location.hash.slice(1);
    if(hash){DATA=JSON.parse(decodeURIComponent(escape(atob(hash))));return;}
  }catch(e){}
  /* ثانيًا: الملف الثابت (الرابط الثابت للبايو) */
  try{
    const r=await fetch('rates-data.json?t='+Date.now());
    if(r.ok)DATA=await r.json();
  }catch(e){}
}
function render(){
  const app=$('app');
  if(!DATA||!DATA.r||!DATA.r.length){
    app.innerHTML='<div class="card"><div class="empty">لا توجد أسعار.<br>اطلب الرابط المحدّث من ARKAN.</div></div>';
    return;
  }
  const rows=DATA.r.map(x=>`<div class="cc">${SYM[x.ccy]||x.ccy} ${x.ccy}</div><div class="pw">${x.w}</div><div class="pr" style="color:#B9A8FF">${x.m!=null?x.m:'—'}</div><div class="pr">${x.r}</div>`).join('');
  app.innerHTML=`
    <div class="card">
      <h2>أسعار اليوم (مقابل الأوقية)</h2>
      <div class="rateGrid" style="grid-template-columns:1fr auto auto auto">
        <div class="h">العملة</div><div class="h" style="text-align:center">جملة</div><div class="h" style="text-align:center">متوسط</div><div class="h" style="text-align:center">تجزئة</div>
        ${rows}
      </div>
      <div class="note">لكل عملة حدّها — فوقه سعر الجملة، دونه التجزئة</div>
    </div>
    <div class="card">
      <h2>احسب تحويلك</h2>
      <label>العملة التي تريد تحويلها</label>
      <select id="cc" onchange="calc()">${DATA.r.map(x=>`<option value="${x.ccy}">${SYM[x.ccy]||x.ccy} — ${window.arkanT?arkanT(NAMES[x.ccy]||x.ccy):(NAMES[x.ccy]||x.ccy)}</option>`).join('')}</select>
      <div id="modeToggle" style="display:flex;gap:8px;margin:14px 0 4px">
        <button id="btnFwd" onclick="setMode('fwd')" style="flex:1;padding:10px;border-radius:12px;border:1px solid rgba(61,220,151,.5);background:rgba(61,220,151,.12);color:#3DDC97;font-family:Cairo;font-size:13px;font-weight:700;cursor:pointer">أدفع عملة ← أستلم أوقية</button>
        <button id="btnRev" onclick="setMode('rev')" style="flex:1;padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:transparent;color:#8B8FA8;font-family:Cairo;font-size:13px;font-weight:700;cursor:pointer">أريد أوقية ← كم عملة؟</button>
      </div>
      <label id="amtLabel">المبلغ</label>
      <input id="amt" inputmode="decimal" placeholder="1000000" oninput="calc()">
      <div class="tier">
        <div class="tierbox" id="tW"><div class="t">جملة</div><div class="v" id="tWv">—</div></div>
        <div class="tierbox" id="tM"><div class="t">متوسط</div><div class="v" id="tMv">—</div></div>
        <div class="tierbox" id="tR"><div class="t">تجزئة</div><div class="v" id="tRv">—</div></div>
      </div>
      <div class="res">
        <div class="lbl" id="resLbl">تستلم بالأوقية</div>
        <div class="big" id="out">0</div>
        <div class="cur" id="resCur">MRU · أوقية</div>
        <div class="rate" id="usedRate"></div>
      </div>
      <input id="who" placeholder="اسمك (اختياري)" style="margin-top:14px;text-align:right;font-family:Tajawal;font-size:15px">
      <button class="go" onclick="send()">أرسل الطلب عبر واتساب</button>
      <div class="note">بعد الإرسال، أكّد الدفع وسنحوّل لك المبلغ فورًا.</div>
    </div>`;
  setMode('fwd');
}
let _mode='fwd';
function setMode(m){
  _mode=m;
  const cc=$('cc')?$('cc').value:'AOA';
  const cSym=SYM[cc]||cc;
  const T=window.arkanT||function(s){return s;};
  const bF=$('btnFwd'),bR=$('btnRev');
  if(!bF||!bR)return;
  if(m==='fwd'){
    bF.style.cssText='flex:1;padding:10px;border-radius:12px;border:1px solid rgba(61,220,151,.5);background:rgba(61,220,151,.12);color:#3DDC97;font-family:Cairo;font-size:13px;font-weight:700;cursor:pointer';
    bR.style.cssText='flex:1;padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:transparent;color:#8B8FA8;font-family:Cairo;font-size:13px;font-weight:700;cursor:pointer';
    bF.textContent=T('أدفع عملة ← أستلم أوقية');
    bR.textContent=T('أريد أوقية ← كم عملة؟');
    if($('amtLabel'))$('amtLabel').textContent=T('المبلغ بـ')+' '+cSym;
  } else {
    bR.style.cssText='flex:1;padding:10px;border-radius:12px;border:1px solid rgba(139,114,255,.5);background:rgba(139,114,255,.12);color:#B9A8FF;font-family:Cairo;font-size:13px;font-weight:700;cursor:pointer';
    bF.style.cssText='flex:1;padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:transparent;color:#8B8FA8;font-family:Cairo;font-size:13px;font-weight:700;cursor:pointer';
    bF.textContent=T('أدفع عملة ← أستلم أوقية');
    bR.textContent=T('أريد أوقية ← كم عملة؟');
    if($('amtLabel'))$('amtLabel').textContent=T('كم أوقية تريد استلامها؟');
  }
  /* translate who placeholder */
  if($('who'))$('who').placeholder=T('اسمك (اختياري)');
  calc();
}
function calc(){
  if(!DATA)return;
  const cc=$('cc').value, raw=parseFloat(String($('amt').value||'').replace(/[^0-9.]/g,''))||0;
  const row=DATA.r.find(x=>x.ccy===cc);if(!row)return;
  const cName=NAMES[cc]||cc, cSym=SYM[cc]||cc;
  const thr=row.thr||0, thrM=row.thrM||0;
  $('tWv').textContent=row.w;$('tMv').textContent=row.m!=null?row.m:'—';$('tRv').textContent=row.r;
  if(_mode==='fwd'){
    /* عادي: أدفع عملة → أستلم أوقية */
    let tier,rate,tierLbl;
    if(raw>=thr){tier='w';rate=row.w;tierLbl=window.arkanT?arkanT('جملة'):'جملة';}
    else if(row.m&&raw>=thrM){tier='m';rate=row.m;tierLbl=window.arkanT?arkanT('متوسط'):'متوسط';}
    else{tier='r';rate=row.r;tierLbl=window.arkanT?arkanT('تجزئة'):'تجزئة';}
    const out=raw*rate;
    $('tW').classList.toggle('on',tier==='w');$('tM').classList.toggle('on',tier==='m');$('tR').classList.toggle('on',tier==='r');
    $('out').textContent=fmt(out,0);
    $('usedRate').textContent=`${fmt(raw)} ${cSym} × ${rate} = ${fmt(out,0)} UM (${tierLbl})`;
    if($('resLbl'))$('resLbl').textContent=window.arkanT?arkanT('تستلم بالأوقية'):'تستلم بالأوقية';
    if($('resCur'))$('resCur').innerHTML=`<span style="opacity:.5;font-size:12px">${cSym} ← </span>${window.arkanT?arkanT('MRU · أوقية'):'MRU · أوقية'}`;
  } else {
    /* عكسي: أريد X أوقية → أحتاج كم عملة؟ */
    const rR=row.r, rM=row.m||null, rW=row.w;
    const qR=raw/rR, qM=rM?raw/rM:null, qW=raw/rW;
    let rate,bestOut,tierLbl;
    if(qW>=thr){rate=rW;bestOut=qW;tierLbl='جملة';}
    else if(rM&&qM&&qM>=thrM){rate=rM;bestOut=qM;tierLbl='متوسط';}
    else{rate=rR;bestOut=qR;tierLbl='تجزئة';}
    $('tW').classList.toggle('on',tierLbl==='جملة');
    $('tM').classList.toggle('on',tierLbl==='متوسط');
    $('tR').classList.toggle('on',tierLbl==='تجزئة');
    $('out').textContent=fmt(bestOut,0);
    $('usedRate').textContent=`${fmt(raw,0)} UM ÷ ${rate} = ${fmt(bestOut,0)} ${cSym} (${tierLbl})`;
    const _tLabel=window.arkanT?arkanT('تحتاج من'):'تحتاج من';
    if($('resLbl'))$('resLbl').textContent=_tLabel+' '+cName;
    if($('resCur'))$('resCur').innerHTML=`<span style="opacity:.5;font-size:12px">${window.arkanT?arkanT('MRU · أوقية'):'MRU ←'} </span>${cSym} · ${cName}`;
  }
}
function send(){
  const cc=$('cc').value, raw=parseFloat(String($('amt').value||'').replace(/[^0-9.]/g,''))||0;
  if(!raw){alert('أدخل المبلغ');return;}
  const row=DATA.r.find(x=>x.ccy===cc);
  const cSym=SYM[cc]||cc;
  const thr=row.thr||0, thrM=row.thrM||0;
  let rate,tierLbl,amtFgn,amtMRU;
  if(_mode==='fwd'){
    if(raw>=thr){rate=row.w;tierLbl='جملة';}
    else if(row.m&&raw>=thrM){rate=row.m;tierLbl='متوسط';}
    else{rate=row.r;tierLbl='تجزئة';}
    amtFgn=raw; amtMRU=raw*rate;
  } else {
    const rR=row.r,rM=row.m,rW=row.w;
    const qR=raw/rR,qM=rM?raw/rM:null,qW=raw/rW;
    if(qW>=thr){rate=rW;tierLbl='جملة';amtFgn=qW;}
    else if(rM&&qM&&qM>=thrM){rate=rM;tierLbl='متوسط';amtFgn=qM;}
    else{rate=rR;tierLbl='تجزئة';amtFgn=qR;}
    amtMRU=raw;
  }
  const who=$('who').value.trim();
  const ref='REQ-'+Date.now().toString().slice(-6);
  const msg=`ARKAN — طلب تحويل\n${ref}\n━━━━━━━━━━\n${who?'الاسم: '+who+'\n':''}المدفوع: ${fmt(amtFgn,0)} ${cSym} (${cc})\nالسعر: ${rate} (${tierLbl})\n━━━━━━━━━━\nالمستلَم: ${fmt(amtMRU,0)} أوقية (MRU)\n━━━━━━━━━━\nأؤكد رغبتي في التحويل.`;
  window.open('https://wa.me/'+DATA.wa+'?text='+encodeURIComponent(msg),'_blank');
}
function _oldSend_unused(){
  const cc=$('cc').value, amt=parseFloat(String($('amt').value||'').replace(/[^0-9.]/g,''))||0;
  if(!amt){alert('أدخل المبلغ');return;}
  const row=DATA.r.find(x=>x.ccy===cc);
  const thr=row.thr||0, thrM=row.thrM||0;
  let rate,tierLbl;
  if(amt>=thr){rate=row.w;tierLbl=window.arkanT?arkanT('جملة'):'جملة';}
  else if(row.m&&amt>=thrM){rate=row.m;tierLbl=window.arkanT?arkanT('متوسط'):'متوسط';}
  else{rate=row.r;tierLbl=window.arkanT?arkanT('تجزئة'):'تجزئة';}
  const out=amt*rate;
  const who=$('who').value.trim();
  const ref='REQ-'+Date.now().toString().slice(-6);
  const L=window.arkanLang?arkanLang():'ar';
  const T={ar:{h:'ARKAN — طلب تحويل',n:'الاسم',a:'المبلغ',r:'السعر',d:'المطلوب استلامه',c:'أؤكد رغبتي في التحويل.',u:'أوقية'},
           fr:{h:'ARKAN — Demande de transfert',n:'Nom',a:'Montant',r:'Taux',d:'À recevoir',c:'Je confirme ma demande de transfert.',u:'Ouguiya'},
           pt:{h:'ARKAN — Pedido de transferência',n:'Nome',a:'Montante',r:'Taxa',d:'A receber',c:'Confirmo o meu pedido de transferência.',u:'Ouguiya'}}[L]||{};
  const msg=
`${T.h}
${ref}
━━━━━━━━━━
${who?T.n+': '+who+'\n':''}${T.a}: ${fmt(amt)} ${SYM[cc]||cc} (${cc})
${T.r}: ${rate} (${tierLbl})
━━━━━━━━━━
${T.d}: ${fmt(out,0)} ${T.u} (MRU)
━━━━━━━━━━
${T.c}`;
  window.open('https://wa.me/'+DATA.wa+'?text='+encodeURIComponent(msg),'_blank');
}
loadData().then(render);
/* re-translate dynamic content on language switch */
document.addEventListener('arkan:lang',function(){
  /* update select options */
  var cc_el=$('cc');
  if(cc_el&&DATA){
    Array.from(cc_el.options).forEach(function(opt){
      var ccy=opt.value;
      var tName=window.arkanT?arkanT(NAMES[ccy]||ccy):(NAMES[ccy]||ccy);
      opt.textContent=(SYM[ccy]||ccy)+' — '+tName;
    });
  }
  /* re-fire mode+calc to update labels */
  if(typeof _mode!=='undefined'&&typeof setMode==='function')setMode(_mode);
  if(typeof calc==='function')calc();
});
</script>
<script src="i18n.js"></script></body>
</html>
