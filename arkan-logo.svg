<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD574"/>
      <stop offset="0.45" stop-color="#F4A50C"/>
      <stop offset="1" stop-color="#B67B06"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.75">
      <stop offset="0" stop-color="#F4A50C" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#F4A50C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15171D"/>
      <stop offset="1" stop-color="#07080B"/>
    </linearGradient>
  </defs>

  <!-- app tile -->
  <rect width="512" height="512" rx="112" fill="url(#edge)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>
  <rect x="6" y="6" width="500" height="500" rx="106" fill="none" stroke="#F4A50C" stroke-opacity="0.18" stroke-width="2"/>

  <!-- hexagon frame -->
  <polygon points="256,92 398,174 398,338 256,420 114,338 114,174"
           fill="none" stroke="url(#gold)" stroke-width="22" stroke-linejoin="round"/>

  <!-- letter A -->
  <path d="M256 148 L178 356" stroke="url(#gold)" stroke-width="26" stroke-linecap="round" fill="none"/>
  <path d="M256 148 L334 356" stroke="url(#gold)" stroke-width="26" stroke-linecap="round" fill="none"/>

  <!-- crossbar = exchange arrows -->
  <path d="M209 282 H289" stroke="url(#gold)" stroke-width="16" stroke-linecap="round"/>
  <polygon points="289,266 317,282 289,298" fill="url(#gold)"/>
  <path d="M303 316 H223" stroke="#FFD574" stroke-width="11" stroke-linecap="round" opacity="0.85"/>
  <polygon points="223,304 201,316 223,328" fill="#FFD574" opacity="0.85"/>
</svg>
