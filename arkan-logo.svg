<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgg" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0" stop-color="#141A45"/>
      <stop offset="1" stop-color="#080B22"/>
    </radialGradient>
    <linearGradient id="mark" x1="0" y1="0.2" x2="1" y2="0.8">
      <stop offset="0" stop-color="#C24DF5"/>
      <stop offset="0.42" stop-color="#7C5CFF"/>
      <stop offset="0.72" stop-color="#2F7BF6"/>
      <stop offset="1" stop-color="#3FB6F9"/>
    </linearGradient>
    <linearGradient id="markSoft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9F5CF0"/>
      <stop offset="1" stop-color="#3E8DF7"/>
    </linearGradient>
    <filter id="glowP" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#7C3AED" flood-opacity="0.55"/>
      <feDropShadow dx="0" dy="10" stdDeviation="22" flood-color="#1D4ED8" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bgg)"/>

  <!-- الحرف A (شيفرون حاد بلا عارضة مستقيمة) -->
  <g filter="url(#glowP)">
    <path fill="url(#mark)" d="
      M256 84
      L394 428 L338 428 L256 222 L174 428 L118 428 Z"/>
    <!-- حافة ضوئية يسرى -->
    <path d="M256 84 L124 424 L118 428 L252 88 Z" fill="#EDE0FF" opacity="0.55"/>
    <!-- حافة ضوئية يمنى -->
    <path d="M256 84 L390 424 L394 428 L260 88 Z" fill="#BFE3FF" opacity="0.45"/>
  </g>

  <!-- السووش الرئيسي: قوس هلالي يخترق الساقين -->
  <g filter="url(#glowP)">
    <path fill="url(#mark)" d="
      M78 384
      Q 256 258 434 350
      Q 300 306 174 352
      Q 118 372 78 384 Z"/>
    <!-- سووش ثانوي رفيع -->
    <path fill="url(#markSoft)" opacity="0.85" d="
      M112 414
      Q 244 344 342 366
      Q 240 372 148 406
      Q 126 412 112 414 Z"/>
  </g>
</svg>
